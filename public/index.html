<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 selection:bg-orange-500 selection:text-white">

    <!-- Navbar -->
    <header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-transparent py-5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div id="brand-logo" class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-orange-500/30">F</div>
                    <span id="brand-name" class="font-bold text-2xl tracking-tight text-gray-900">Foodie<span class="text-orange-500">Express</span></span>
                </div>

                <div class="hidden md:flex items-center flex-1 max-w-md mx-8">
                    <div class="relative w-full group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="h-5 w-5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        </div>
                        <input type="text" class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-full leading-5 bg-white/80 backdrop-blur-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white transition-all sm:text-sm shadow-sm" placeholder="Search for restaurants, cuisines, or dishes...">
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-6">
                    <button class="text-gray-600 hover:text-orange-500 font-medium transition-colors">Offers</button>
                    <button class="text-gray-600 hover:text-orange-500 font-medium transition-colors">Help</button>
                    <div class="flex items-center gap-4 border-l border-gray-200 pl-6">
                        <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-orange-500 transition-colors">
                            <i data-lucide="shopping-bag" class="h-6 w-6"></i>
                            <span class="cart-count absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-orange-500 rounded-full">0</span>
                        </button>
                        <button class="auth-btn flex items-center gap-2 bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-full font-medium transition-colors">
                            <i data-lucide="user" class="h-4 w-4"></i>
                            <span>Sign In</span>
                        </button>
                    </div>
                </div>

                <div class="md:hidden flex items-center gap-4">
                    <button onclick="toggleCart()" class="relative p-2 text-gray-600">
                        <i data-lucide="shopping-bag" class="h-6 w-6"></i>
                        <span class="cart-count absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-orange-500 rounded-full">0</span>
                    </button>
                    <button id="mobile-menu-btn" class="p-2 text-gray-600">
                        <i data-lucide="menu" class="h-6 w-6" id="menu-icon"></i>
                        <i data-lucide="x" class="h-6 w-6 hidden" id="close-icon"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 px-4 py-4 shadow-lg overflow-hidden transition-all duration-300">
            <div class="flex flex-col gap-4">
                <button class="auth-btn flex items-center justify-center gap-2 bg-orange-500 text-white px-4 py-3 rounded-lg font-medium mt-2">
                    <i data-lucide="user" class="h-5 w-5"></i>
                    <span>Sign In / Sign Up</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Cart Sidebar -->
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-[55] hidden opacity-0 transition-opacity duration-300"></div>
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center">
            <h2 class="text-xl font-bold">Your Cart</h2>
            <button onclick="toggleCart()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x" class="h-6 w-6"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
            <!-- Cart items rendered here -->
        </div>
        <div class="p-4 border-t border-gray-100 bg-gray-50">
            <div class="flex justify-between mb-4 font-bold text-lg">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors">
                <i data-lucide="message-circle" class="h-5 w-5"></i> Order via WhatsApp
            </button>
        </div>
    </div>

    <main>
        <!-- Hero Section -->
        <section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
            <div class="absolute top-0 right-0 -z-10 w-full h-full overflow-hidden">
                <div class="absolute top-[-10%] right-[-5%] w-[50%] h-[80%] bg-orange-100/50 rounded-full blur-3xl"></div>
                <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[60%] bg-yellow-100/50 rounded-full blur-3xl"></div>
            </div>

            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
                <div class="grid lg:grid-cols-2 gap-12 items-center">
                    <div class="max-w-2xl">
                        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-orange-100 text-orange-600 font-medium text-sm mb-6">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                            </span>
                            Fastest Delivery in Town
                        </div>
                        <h1 id="hero-title" class="text-5xl lg:text-7xl font-extrabold text-gray-900 tracking-tight leading-[1.1] mb-6"></h1>
                        <p id="hero-subtitle" class="text-lg text-gray-600 mb-8 max-w-lg leading-relaxed"></p>

                        <div class="bg-white p-2 rounded-2xl shadow-xl shadow-gray-200/50 flex flex-col sm:flex-row gap-2 max-w-xl">
                            <div class="relative flex-1 flex items-center">
                                <i data-lucide="search" class="absolute left-4 h-5 w-5 text-orange-500"></i>
                                <input type="text" placeholder="Search food..." class="w-full pl-12 pr-4 py-3.5 bg-transparent focus:outline-none text-gray-700 font-medium placeholder-gray-400">
                            </div>
                            <button class="bg-orange-500 hover:bg-orange-600 text-white px-8 py-3.5 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                                Search
                                <i data-lucide="arrow-right" class="h-4 w-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="relative hidden lg:block">
                        <div class="relative w-full aspect-square max-w-lg mx-auto">
                            <div class="absolute inset-0 bg-gradient-to-tr from-orange-400 to-yellow-400 rounded-full opacity-20 animate-pulse"></div>
                            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=1000&q=80" alt="Delicious Burger" class="absolute inset-0 w-full h-full object-cover rounded-full border-8 border-white shadow-2xl" referrerpolicy="no-referrer">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section class="py-12 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold text-gray-900">Explore Categories</h2>
                </div>
                <div id="categories-container" class="flex overflow-x-auto pb-6 -mx-4 px-4 sm:mx-0 sm:px-0 gap-4 sm:gap-6 hide-scrollbar">
                    <!-- Dynamic Categories -->
                </div>
            </div>
        </section>

        <!-- Popular Section -->
        <section class="py-16 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-10 gap-4">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-900 mb-2">Popular Near You</h2>
                        <p class="text-gray-500">Explore the most ordered dishes in your area</p>
                    </div>
                </div>

                <div id="foods-container" class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-8">
                    <!-- Dynamic Foods -->
                </div>
            </div>
        </section>
    </main>

    <script>
        let siteData = {};
        let cart = [];
        let currentUser = localStorage.getItem('currentUser');

        // Initialize Lucide Icons
        lucide.createIcons();

        // Navbar Scroll Effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                navbar.classList.add('bg-white', 'shadow-sm', 'py-3');
                navbar.classList.remove('bg-transparent', 'py-5');
            } else {
                navbar.classList.add('bg-transparent', 'py-5');
                navbar.classList.remove('bg-white', 'shadow-sm', 'py-3');
            }
        });

        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');

        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            menuIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
        });

        // Data Loading
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                siteData = await res.json();
                renderSite();
            } catch (e) {
                console.error("Failed to load data", e);
            }
        }

        function renderSite() {
            if(!siteData.brand) return;

            document.getElementById('brand-logo').innerText = siteData.brand.logoText;
            document.getElementById('brand-name').innerHTML = siteData.brand.name;
            document.getElementById('hero-title').innerHTML = siteData.brand.heroTitle;
            document.getElementById('hero-subtitle').innerText = siteData.brand.heroSubtitle;

            const catContainer = document.getElementById('categories-container');
            catContainer.innerHTML = siteData.categories.map(c => `
                <button class="flex flex-col items-center gap-3 min-w-[80px] sm:min-w-[100px] group">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-gray-50 group-hover:bg-orange-50 flex items-center justify-center text-3xl sm:text-4xl shadow-sm border border-gray-100 transition-colors">${c.icon}</div>
                    <span class="font-medium text-gray-700 group-hover:text-orange-500 transition-colors text-sm sm:text-base">${c.name}</span>
                </button>
            `).join('');

            const foodContainer = document.getElementById('foods-container');
            foodContainer.innerHTML = siteData.foods.map(f => `
                <div class="bg-white rounded-xl sm:rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-shadow border border-gray-100 group flex flex-col">
                    <div class="relative h-32 sm:h-48 overflow-hidden shrink-0">
                        <img src="${f.image}" alt="${f.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" referrerpolicy="no-referrer">
                        <div class="absolute bottom-2 left-2 sm:bottom-4 sm:left-4 flex gap-2">
                            <span class="px-1.5 py-0.5 sm:px-2.5 sm:py-1 rounded-md bg-white/90 backdrop-blur-sm text-[10px] sm:text-xs font-bold text-gray-900 flex items-center gap-1">
                                <i data-lucide="clock" class="h-2.5 w-2.5 sm:h-3 sm:w-3 text-orange-500"></i>
                                <span class="hidden sm:inline">${f.time}</span>
                                <span class="sm:hidden">${f.time.split(' ')[0]}</span>
                            </span>
                        </div>
                    </div>
                    <div class="p-3 sm:p-5 flex flex-col flex-1">
                        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-1 sm:mb-2 gap-1">
                            <h3 class="font-bold text-sm sm:text-lg text-gray-900 line-clamp-1">${f.name}</h3>
                            <span class="font-bold text-sm sm:text-lg text-orange-500">$${f.price}</span>
                        </div>
                        <p class="text-gray-500 text-xs sm:text-sm mb-2 sm:mb-4 line-clamp-1">${f.restaurant}</p>
                        <div class="flex items-center justify-between mt-auto">
                            <div class="flex items-center gap-1">
                                <i data-lucide="star" class="h-3 w-3 sm:h-4 sm:w-4 fill-yellow-400 text-yellow-400"></i>
                                <span class="font-bold text-xs sm:text-sm text-gray-900">${f.rating}</span>
                            </div>
                            <button onclick="addToCart(${f.id})" class="bg-gray-900 hover:bg-orange-500 text-white p-1.5 sm:p-2 rounded-lg sm:rounded-xl transition-colors">
                                <i data-lucide="shopping-bag" class="h-4 w-4 sm:h-5 sm:w-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
            updateAuthUI();
        }

        // Auth Logic
        function login() {
            const name = prompt("Enter your name to login (or type 'admin' for admin panel):");
            if(name) {
                if(name.toLowerCase() === 'admin') {
                    const pass = prompt("Enter admin password (hint: admin123):");
                    if(pass === 'admin123') {
                        window.location.href = '/admin.html';
                    } else {
                        alert("Wrong password!");
                    }
                } else {
                    localStorage.setItem('currentUser', name);
                    currentUser = name;
                    updateAuthUI();
                }
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            updateAuthUI();
        }

        function updateAuthUI() {
            const authBtns = document.querySelectorAll('.auth-btn');
            authBtns.forEach(btn => {
                if(currentUser) {
                    btn.innerHTML = `<i data-lucide="user" class="h-4 w-4"></i><span>Welcome, ${currentUser}</span>`;
                    btn.onclick = logout;
                } else {
                    btn.innerHTML = `<i data-lucide="user" class="h-4 w-4"></i><span>Sign In</span>`;
                    btn.onclick = login;
                }
            });
            lucide.createIcons();
        }

        // Cart Logic
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function addToCart(id) {
            const food = siteData.foods.find(f => f.id === id);
            const existing = cart.find(item => item.id === id);
            if(existing) existing.qty++;
            else cart.push({...food, qty: 1});
            updateCartUI();
            
            // Show cart automatically
            const sidebar = document.getElementById('cart-sidebar');
            if (sidebar.classList.contains('translate-x-full')) {
                toggleCart();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.querySelectorAll('.cart-count').forEach(el => el.innerText = count);
            
            const cartItemsContainer = document.getElementById('cart-items');
            let total = 0;
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center mt-10">Your cart is empty</p>';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => {
                    total += item.price * item.qty;
                    return `
                    <div class="flex gap-4 border-b border-gray-100 pb-4">
                        <img src="${item.image}" class="w-20 h-20 object-cover rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-orange-500 font-bold">$${item.price}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-sm text-gray-500">Qty: ${item.qty}</span>
                                <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm hover:underline">Remove</button>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }
            
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Cart is empty!");
            if(!currentUser) {
                alert("Please sign in first to place an order.");
                login();
                return;
            }
            
            let text = `*New Order from ${currentUser}*\n\n`;
            let total = 0;
            cart.forEach(item => {
                text += `${item.qty}x ${item.name} - $${(item.price * item.qty).toFixed(2)}\n`;
                total += item.price * item.qty;
            });
            text += `\n*Total: $${total.toFixed(2)}*`;
            
            const waNumber = "917098894401";
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Initialize
        loadData();
        updateCartUI();
    </script>
</body>
</html>
